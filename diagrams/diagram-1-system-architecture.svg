  <rect x="845" y="104" width="225" height="12" fill="url(#green)"/>
  <text x="957" y="104" text-anchor="middle" fill="#f0fdf4" font-size="13" font-weight="700">📁  ANY PROJECT</text>

  <g font-size="11">
    <text x="865" y="138" fill="#94a3b8" font-family="'Cascadia Code','Fira Code',monospace">~/projects/my-app/</text>
    <text x="865" y="160" fill="#e2e8f0" font-family="'Cascadia Code','Fira Code',monospace" font-size="13" font-weight="700">$ claude</text>

    <rect x="863" y="172" width="189" height="1" fill="#1e293b"/>

    <text x="865" y="192" fill="#94a3b8" font-size="10" font-weight="600">AUTO-LOADED:</text>
    <circle cx="873" cy="210" r="4" fill="#10b981"/>
    <text x="883" y="214" fill="#cbd5e1" font-size="11">~/.claude/CLAUDE.md</text>
    <circle cx="873" cy="232" r="4" fill="#10b981"/>
    <text x="883" y="236" fill="#cbd5e1" font-size="11">All 13 agents</text>
    <circle cx="873" cy="254" r="4" fill="#10b981"/>
    <text x="883" y="258" fill="#cbd5e1" font-size="11">All 3 skills</text>
    <circle cx="873" cy="276" r="4" fill="#10b981"/>
    <text x="883" y="280" fill="#cbd5e1" font-size="11">All 7 commands</text>
    <circle cx="873" cy="298" r="4" fill="#10b981"/>
    <text x="883" y="302" fill="#cbd5e1" font-size="11">Docs (sources of truth)</text>
    <circle cx="873" cy="320" r="4" fill="#f59e0b"/>
    <text x="883" y="324" fill="#cbd5e1" font-size="11">CLAUDE.local.md</text>
    <circle cx="873" cy="342" r="4" fill="#3b82f6"/>
    <text x="883" y="346" fill="#cbd5e1" font-size="11">.claude/CLAUDE.md</text>

    <rect x="863" y="362" width="189" height="1" fill="#1e293b"/>

    <text x="957" y="384" text-anchor="middle" fill="#10b981" font-size="11" font-weight="700">Zero per-project config needed</text>
    <text x="957" y="402" text-anchor="middle" fill="#64748b" font-size="10">Project overrides merge on top</text>
    <text x="957" y="418" text-anchor="middle" fill="#64748b" font-size="10">Skills activate by file context</text>

    <rect x="863" y="432" width="189" height="1" fill="#1e293b"/>

    <text x="865" y="452" fill="#94a3b8" font-size="10" font-weight="600">TWO MODES:</text>
    <text x="865" y="470" fill="#22d3ee" font-size="11" font-family="'Cascadia Code','Fira Code',monospace">/build &lt;task&gt;</text>
    <text x="990" y="470" fill="#64748b" font-size="9">orchestrated</text>
  </g>

  <!-- ═══════════════════════════════════════ -->
