<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="100%" stop-color="#141e30"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b45309"/><stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#047857"/><stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6d28d9"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b91c1c"/><stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e7490"/><stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="aW" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#94a3b8"/></marker>
    <marker id="aA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#d97706"/></marker>
    <marker id="aG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#10b981"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">System Architecture Overview</text>
  <text x="550" y="54" text-anchor="middle" fill="#64748b" font-size="12">claude-code-setup — One repo, one install, every project.</text>
  <rect x="380" y="62" width="340" height="2" fill="url(#amber)" rx="1"/>

  <!-- ════════════════════════════════════════════ -->
  <!-- LEFT: Source Repo                            -->
  <!-- ════════════════════════════════════════════ -->
  <g filter="url(#sh)">
    <rect x="30" y="82" width="380" height="630" fill="#111827" rx="10" stroke="#1e293b" stroke-width="1"/>
  </g>
  <rect x="30" y="82" width="380" height="34" fill="url(#amber)" rx="10"/>
  <rect x="30" y="104" width="380" height="12" fill="url(#amber)"/>
  <text x="220" y="104" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">📦  SOURCE REPO  ·  claude-code-setup/</text>

  <g font-family="'Cascadia Code','Fira Code',monospace" font-size="11">
    <!-- global/ -->
    <rect x="48" y="128" width="344" height="52" fill="#1a1a2e" rx="5" stroke="#334155" stroke-width="0.5"/>
    <text x="60" y="148" fill="#fbbf24" font-weight="700">global/</text>
    <text x="60" y="168" fill="#cbd5e1">└── CLAUDE.md</text>
    <text x="220" y="168" fill="#64748b" font-size="9">workflow, philosophy, kickoff Qs</text>

    <!-- agents/ -->
    <rect x="48" y="190" width="344" height="155" fill="#1a1a2e" rx="5" stroke="#334155" stroke-width="0.5"/>
    <text x="60" y="210" fill="#f87171" font-weight="700">agents/</text>
    <text x="148" y="210" fill="#64748b" font-size="9">9 agent definitions</text>
    <text x="60" y="228" fill="#94a3b8">├── orchestrator-review.md</text>
    <text x="60" y="244" fill="#94a3b8">├── reviewer-architect.md</text>
    <text x="60" y="260" fill="#94a3b8">├── reviewer-security.md</text>
    <text x="60" y="276" fill="#94a3b8">├── reviewer-quality.md</text>
    <text x="60" y="292" fill="#94a3b8">├── reviewer-performance.md</text>
    <text x="60" y="308" fill="#94a3b8">├── test-writer.md</text>
    <text x="60" y="324" fill="#94a3b8">├── documenter.md</text>
    <text x="60" y="336" fill="#94a3b8">├── dependency-scanner.md</text>
    <!-- -->

    <!-- skills/ -->
    <rect x="48" y="354" width="344" height="78" fill="#1a1a2e" rx="5" stroke="#334155" stroke-width="0.5"/>
    <text x="60" y="374" fill="#a78bfa" font-weight="700">skills/</text>
    <text x="126" y="374" fill="#64748b" font-size="9">3 framework knowledge packs</text>
    <text x="60" y="392" fill="#94a3b8">├── java-conventions/</text>
    <text x="260" y="392" fill="#475569" font-size="9">SKILL.md + reference.md</text>
    <text x="60" y="408" fill="#94a3b8">├── angular-conventions/</text>
    <text x="60" y="424" fill="#94a3b8">└── react-conventions/</text>

    <!-- commands/ -->
    <rect x="48" y="442" width="344" height="78" fill="#1a1a2e" rx="5" stroke="#334155" stroke-width="0.5"/>
    <text x="60" y="462" fill="#22d3ee" font-weight="700">commands/</text>
    <text x="148" y="462" fill="#64748b" font-size="9">6 slash commands</text>
    <text x="60" y="480" fill="#94a3b8">├── review.md  test.md  security.md</text>
    <text x="60" y="496" fill="#94a3b8">├── document.md  dependencies.md</text>
    <text x="60" y="512" fill="#94a3b8">└── upgrade.md</text>

    <!-- docs/ -->
    <rect x="48" y="530" width="344" height="56" fill="#1a1a2e" rx="5" stroke="#334155" stroke-width="0.5"/>
    <text x="60" y="550" fill="#10b981" font-weight="700">docs/</text>
    <text x="108" y="550" fill="#64748b" font-size="9">single sources of truth</text>
    <text x="60" y="568" fill="#94a3b8">├── coding-standards.md</text>
    <text x="60" y="580" fill="#94a3b8">└── review-severity-scale.md</text>

    <!-- templates/ -->
    <rect x="48" y="596" width="344" height="40" fill="#1a1a2e" rx="5" stroke="#334155" stroke-width="0.5"/>
    <text x="60" y="616" fill="#f59e0b" font-weight="700">templates/</text>
    <text x="60" y="630" fill="#94a3b8">└── CLAUDE.local.md</text>
    <text x="260" y="630" fill="#64748b" font-size="9">private overrides tpl</text>

    <!-- Scripts -->
    <rect x="48" y="646" width="344" height="52" fill="#1a1a2e" rx="5" stroke="#334155" stroke-width="0.5"/>
    <text x="60" y="666" fill="#fbbf24" font-weight="700">install.sh</text>
    <text x="148" y="666" fill="#475569">+</text>
    <text x="160" y="666" fill="#fbbf24" font-weight="700">install.ps1</text>
    <text x="290" y="666" fill="#64748b" font-size="9">cross-platform</text>
    <text x="60" y="686" fill="#fbbf24" font-weight="700">verify.sh</text>
    <text x="148" y="686" fill="#475569">+</text>
    <text x="160" y="686" fill="#fbbf24" font-weight="700">verify.ps1</text>
    <text x="290" y="686" fill="#64748b" font-size="9">check symlinks</text>
  </g>

  <!-- ════════════════════════════════════════════ -->
  <!-- SYMLINK ARROWS                               -->
  <!-- ════════════════════════════════════════════ -->
  <g stroke="#d97706" stroke-width="1.5" stroke-dasharray="7,4" fill="none">
    <path d="M392 154 L508 142" marker-end="url(#aA)"/>
    <path d="M392 260 L508 210" marker-end="url(#aA)"/>
    <path d="M392 395 L508 282" marker-end="url(#aA)"/>
    <path d="M392 478 L508 348" marker-end="url(#aA)"/>
    <path d="M392 558 L508 414" marker-end="url(#aA)"/>
  </g>

  <!-- install.sh label on arrows -->
  <g transform="rotate(-18, 452, 200)">
    <rect x="434" y="188" width="70" height="18" fill="#0c1222" rx="3"/>
    <text x="469" y="201" text-anchor="middle" fill="#d97706" font-size="9" font-weight="600">symlinks</text>
  </g>

  <!-- ════════════════════════════════════════════ -->
  <!-- CENTER: ~/.claude/ target                    -->
  <!-- ════════════════════════════════════════════ -->
  <g filter="url(#sh)">
    <rect x="510" y="82" width="290" height="400" fill="#111827" rx="10" stroke="#1e293b" stroke-width="1"/>
  </g>
  <rect x="510" y="82" width="290" height="34" fill="url(#blue)" rx="10"/>
  <rect x="510" y="104" width="290" height="12" fill="url(#blue)"/>
  <text x="655" y="104" text-anchor="middle" fill="#eff6ff" font-size="13" font-weight="700">🏠  ~/.claude/  (user scope)</text>

  <g font-family="'Cascadia Code','Fira Code',monospace" font-size="11">
    <text x="530" y="140" fill="#fbbf24">CLAUDE.md</text>
    <text x="640" y="140" fill="#475569" font-size="9">→ global/CLAUDE.md</text>

    <rect x="528" y="150" width="254" height="1" fill="#1e293b"/>

    <text x="530" y="170" fill="#f87171">agents/</text>
    <text x="640" y="170" fill="#475569" font-size="9">→ agents/</text>
    <text x="530" y="188" fill="#64748b" font-size="10">9 agents: review, test, docs,</text>
    <text x="530" y="202" fill="#64748b" font-size="10">deps, upgrade</text>

    <rect x="528" y="212" width="254" height="1" fill="#1e293b"/>

    <text x="530" y="232" fill="#a78bfa">skills/</text>
    <text x="640" y="232" fill="#475569" font-size="9">→ skills/</text>
    <text x="530" y="250" fill="#64748b" font-size="10">Java · Angular · React</text>
    <text x="530" y="264" fill="#64748b" font-size="10">auto-activate by file globs</text>

    <rect x="528" y="274" width="254" height="1" fill="#1e293b"/>

    <text x="530" y="294" fill="#22d3ee">commands/</text>
    <text x="640" y="294" fill="#475569" font-size="9">→ commands/</text>
    <text x="530" y="312" fill="#64748b" font-size="10">/review /test /security</text>
    <text x="530" y="326" fill="#64748b" font-size="10">/document /dependencies /upgrade</text>

    <rect x="528" y="336" width="254" height="1" fill="#1e293b"/>

    <text x="530" y="356" fill="#10b981">docs/</text>
    <text x="640" y="356" fill="#475569" font-size="9">→ docs/</text>
    <text x="530" y="374" fill="#64748b" font-size="10">coding-standards, severity-scale</text>

    <rect x="528" y="384" width="254" height="1" fill="#1e293b"/>

    <text x="530" y="406" fill="#f59e0b">CLAUDE.local.md</text>
    <text x="530" y="424" fill="#64748b" font-size="10">private overrides (not symlinked)</text>
    <text x="530" y="438" fill="#64748b" font-size="10">API keys, internal paths</text>

    <rect x="528" y="448" width="254" height="1" fill="#1e293b"/>

    <text x="530" y="468" fill="#94a3b8" font-size="10">✏️ Edit repo → config updates instantly</text>
  </g>

  <!-- ════════════════════════════════════════════ -->
  <!-- RIGHT TOP: Any Project                       -->
  <!-- ════════════════════════════════════════════ -->
  <path d="M800 250 L840 250" stroke="#10b981" stroke-width="2" marker-end="url(#aG)"/>

  <g filter="url(#sh)">
    <rect x="845" y="82" width="225" height="350" fill="#111827" rx="10" stroke="#1e293b" stroke-width="1"/>
  </g>
  <rect x="845" y="82" width="225" height="34" fill="url(#green)" rx="10"/>
  <rect x="845" y="104" width="225" height="12" fill="url(#green)"/>
  <text x="957" y="104" text-anchor="middle" fill="#f0fdf4" font-size="13" font-weight="700">📁  ANY PROJECT</text>

  <g font-size="11">
    <text x="865" y="138" fill="#94a3b8" font-family="'Cascadia Code','Fira Code',monospace">~/projects/my-app/</text>
    <text x="865" y="160" fill="#e2e8f0" font-family="'Cascadia Code','Fira Code',monospace" font-size="13" font-weight="700">$ claude</text>

    <rect x="863" y="172" width="189" height="1" fill="#1e293b"/>

    <text x="865" y="192" fill="#94a3b8" font-size="10" font-weight="600">AUTO-LOADED AT SESSION START:</text>

    <circle cx="873" cy="210" r="4" fill="#10b981"/>
    <text x="883" y="214" fill="#cbd5e1" font-size="11">~/.claude/CLAUDE.md</text>
    <circle cx="873" cy="230" r="4" fill="#10b981"/>
    <text x="883" y="234" fill="#cbd5e1" font-size="11">All 9 agents</text>
    <circle cx="873" cy="250" r="4" fill="#10b981"/>
    <text x="883" y="254" fill="#cbd5e1" font-size="11">All 3 skills</text>
    <circle cx="873" cy="270" r="4" fill="#10b981"/>
    <text x="883" y="274" fill="#cbd5e1" font-size="11">All 6 commands</text>
    <circle cx="873" cy="290" r="4" fill="#10b981"/>
    <text x="883" y="294" fill="#cbd5e1" font-size="11">Docs (single sources of truth)</text>
    <circle cx="873" cy="310" r="4" fill="#f59e0b"/>
    <text x="883" y="314" fill="#cbd5e1" font-size="11">CLAUDE.local.md (if exists)</text>
    <circle cx="873" cy="330" r="4" fill="#3b82f6"/>
    <text x="883" y="334" fill="#cbd5e1" font-size="11">.claude/CLAUDE.md (if exists)</text>

    <rect x="863" y="348" width="189" height="1" fill="#1e293b"/>

    <text x="957" y="370" text-anchor="middle" fill="#10b981" font-size="11" font-weight="700">Zero per-project config needed</text>
    <text x="957" y="388" text-anchor="middle" fill="#64748b" font-size="10">Project overrides merge on top</text>
    <text x="957" y="403" text-anchor="middle" fill="#64748b" font-size="10">Skills activate by file context</text>
  </g>

  <!-- ════════════════════════════════════════════ -->
  <!-- BOTTOM: Scope Precedence                     -->
  <!-- ════════════════════════════════════════════ -->
  <g filter="url(#sh)">
    <rect x="510" y="510" width="560" height="200" fill="#111827" rx="10" stroke="#1e293b" stroke-width="1"/>
  </g>
  <rect x="510" y="510" width="560" height="34" fill="url(#purple)" rx="10"/>
  <rect x="510" y="532" width="560" height="12" fill="url(#purple)"/>
  <text x="790" y="532" text-anchor="middle" fill="#faf5ff" font-size="13" font-weight="700">⚡  SCOPE PRECEDENCE  ·  Higher wins on conflicts</text>

  <!-- Stack visualization -->
  <!-- Layer 1 (top) — CLAUDE.local.md -->
  <rect x="580" y="560" width="420" height="38" fill="#1a1a2e" rx="6" stroke="#ef4444" stroke-width="1.5"/>
  <text x="600" y="575" fill="#ef4444" font-size="11" font-weight="700">①  HIGHEST</text>
  <text x="600" y="591" fill="#fca5a5" font-size="12" font-weight="600" font-family="'Cascadia Code','Fira Code',monospace">CLAUDE.local.md</text>
  <text x="820" y="584" fill="#64748b" font-size="10">Private overrides · API keys</text>
  <text x="820" y="596" fill="#64748b" font-size="10">Never committed · Not symlinked</text>

  <!-- Layer 2 — Project .claude/CLAUDE.md -->
  <rect x="580" y="606" width="420" height="38" fill="#1a1a2e" rx="6" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="600" y="621" fill="#3b82f6" font-size="11" font-weight="700">②  PROJECT</text>
  <text x="600" y="637" fill="#93c5fd" font-size="12" font-weight="600" font-family="'Cascadia Code','Fira Code',monospace">.claude/CLAUDE.md</text>
  <text x="820" y="630" fill="#64748b" font-size="10">Project-specific rules</text>
  <text x="820" y="642" fill="#64748b" font-size="10">Committed to project repo</text>

  <!-- Layer 3 (bottom) — ~/.claude/CLAUDE.md -->
  <rect x="580" y="652" width="420" height="38" fill="#1a1a2e" rx="6" stroke="#d97706" stroke-width="1.5"/>
  <text x="600" y="667" fill="#d97706" font-size="11" font-weight="700">③  GLOBAL</text>
  <text x="600" y="683" fill="#fcd34d" font-size="12" font-weight="600" font-family="'Cascadia Code','Fira Code',monospace">~/.claude/CLAUDE.md</text>
  <text x="820" y="676" fill="#64748b" font-size="10">Personal baseline · Philosophy</text>
  <text x="820" y="688" fill="#64748b" font-size="10">Symlinked from this repo</text>

  <!-- Footer -->
  <text x="550" y="808" text-anchor="middle" fill="#334155" font-size="10">claude-code-setup  ·  github.com  ·  public repo — no secrets  ·  works on macOS, Linux, Windows (Git Bash / PowerShell)</text>
</svg>