    <text x="60" y="648" fill="#94a3b8">└── CLAUDE.local.md</text>

    <!-- Scripts -->
    <rect x="48" y="664" width="344" height="44" fill="#1a1a2e" rx="5" stroke="#334155" stroke-width="0.5"/>
    <text x="60" y="684" fill="#fbbf24" font-weight="700">install.sh</text>
    <text x="148" y="684" fill="#475569">+</text>
    <text x="160" y="684" fill="#fbbf24" font-weight="700">install.ps1</text>
    <text x="290" y="684" fill="#64748b" font-size="9">cross-platform</text>
    <text x="60" y="700" fill="#fbbf24" font-weight="700">verify.sh</text>
    <text x="148" y="700" fill="#475569">+</text>
    <text x="160" y="700" fill="#fbbf24" font-weight="700">verify.ps1</text>
    <text x="290" y="700" fill="#64748b" font-size="9">check symlinks</text>
  </g>

  <!-- ═══════════════════════════════════════ -->
