  </g>
  <rect x="30" y="82" width="380" height="34" fill="url(#amber)" rx="10"/>
  <rect x="30" y="104" width="380" height="12" fill="url(#amber)"/>
  <text x="220" y="104" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">📦  SOURCE REPO  ·  claude-code-setup/</text>

  <g font-family="'Cascadia Code','Fira Code',monospace" font-size="11">
    <!-- global/ -->
    <rect x="48" y="128" width="344" height="48" fill="#1a1a2e" rx="5" stroke="#334155" stroke-width="0.5"/>
    <text x="60" y="148" fill="#fbbf24" font-weight="700">global/</text>
    <text x="60" y="166" fill="#cbd5e1">└── CLAUDE.md</text>
    <text x="220" y="166" fill="#64748b" font-size="9">workflow, philosophy, kickoff Qs</text>

    <!-- agents/ -->
    <rect x="48" y="186" width="344" height="196" fill="#1a1a2e" rx="5" stroke="#334155" stroke-width="0.5"/>
    <text x="60" y="206" fill="#f87171" font-weight="700">agents/</text>
    <text x="148" y="206" fill="#64748b" font-size="9">13 agent definitions</text>
    <text x="60" y="224" fill="#64748b" font-size="9" font-weight="600">BUILD WORKFLOW:</text>
    <text x="60" y="240" fill="#94a3b8">├── orchestrator-main.md</text>
    <text x="60" y="256" fill="#94a3b8">├── researcher.md</text>
    <text x="60" y="272" fill="#94a3b8">├── developer.md</text>
    <text x="60" y="288" fill="#94a3b8">├── integration-reviewer.md</text>
    <text x="60" y="306" fill="#64748b" font-size="9" font-weight="600">REVIEW:</text>
    <text x="60" y="322" fill="#94a3b8">├── orchestrator-review.md</text>
    <text x="60" y="338" fill="#94a3b8">├── reviewer-{arch,sec,qual,perf}.md</text>
    <text x="60" y="356" fill="#64748b" font-size="9" font-weight="600">UTILITY:</text>
    <text x="60" y="372" fill="#94a3b8">├── documenter.md  test-writer.md</text>

