    <text x="148" y="492" fill="#64748b" font-size="9">7 slash commands</text>
    <text x="60" y="510" fill="#94a3b8">├── build.md  review.md  security.md</text>
    <text x="60" y="526" fill="#94a3b8">├── test.md  document.md</text>
    <text x="60" y="536" fill="#94a3b8">└── dependencies.md  upgrade.md</text>

