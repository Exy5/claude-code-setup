    <text x="530" y="196" fill="#64748b" font-size="10">13 agents: build, review,</text>
    <text x="530" y="210" fill="#64748b" font-size="10">utility, maintenance</text>

    <rect x="528" y="220" width="254" height="1" fill="#1e293b"/>

    <text x="530" y="246" fill="#a78bfa">skills/</text>
    <text x="660" y="246" fill="#475569" font-size="9">→ skills/</text>
    <text x="530" y="264" fill="#64748b" font-size="10">Java · Angular · React</text>
    <text x="530" y="278" fill="#64748b" font-size="10">auto-activate by file globs</text>

    <rect x="528" y="288" width="254" height="1" fill="#1e293b"/>

    <text x="530" y="314" fill="#22d3ee">commands/</text>
    <text x="660" y="314" fill="#475569" font-size="9">→ commands/</text>
    <text x="530" y="332" fill="#64748b" font-size="10">/build /review /security /test</text>
    <text x="530" y="346" fill="#64748b" font-size="10">/document /dependencies /upgrade</text>

    <rect x="528" y="356" width="254" height="1" fill="#1e293b"/>

    <text x="530" y="382" fill="#10b981">docs/</text>
    <text x="660" y="382" fill="#475569" font-size="9">→ docs/</text>
    <text x="530" y="400" fill="#64748b" font-size="10">coding-standards, severity-scale</text>

    <rect x="528" y="410" width="254" height="1" fill="#1e293b"/>

    <text x="530" y="436" fill="#f59e0b">CLAUDE.local.md</text>
    <text x="530" y="454" fill="#64748b" font-size="10">private overrides (not symlinked)</text>

    <rect x="528" y="466" width="254" height="1" fill="#1e293b"/>

    <text x="530" y="478" fill="#94a3b8" font-size="10">✏️ Edit repo → config updates instantly</text>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- RIGHT TOP: Any Project                  -->
  <!-- ═══════════════════════════════════════ -->
  <path d="M800 260 L840 260" stroke="#10b981" stroke-width="2" marker-end="url(#aG)"/>

  <g filter="url(#sh)">
    <rect x="845" y="82" width="225" height="400" fill="#111827" rx="10" stroke="#1e293b" stroke-width="1"/>
