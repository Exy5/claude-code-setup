    <rect x="48" y="392" width="344" height="72" fill="#1a1a2e" rx="5" stroke="#334155" stroke-width="0.5"/>
    <text x="60" y="412" fill="#a78bfa" font-weight="700">skills/</text>
    <text x="126" y="412" fill="#64748b" font-size="9">3 framework knowledge packs</text>
    <text x="60" y="430" fill="#94a3b8">├── java-conventions/</text>
