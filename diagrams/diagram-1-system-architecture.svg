  <text x="600" y="637" fill="#93c5fd" font-size="12" font-weight="600" font-family="'Cascadia Code','Fira Code',monospace">.claude/CLAUDE.md</text>
  <text x="820" y="630" fill="#64748b" font-size="10">Project-specific rules</text>

  <rect x="580" y="652" width="420" height="38" fill="#1a1a2e" rx="6" stroke="#d97706" stroke-width="1.5"/>
  <text x="600" y="667" fill="#d97706" font-size="11" font-weight="700">③  GLOBAL</text>
  <text x="600" y="683" fill="#fcd34d" font-size="12" font-weight="600" font-family="'Cascadia Code','Fira Code',monospace">~/.claude/CLAUDE.md</text>
  <text x="820" y="676" fill="#64748b" font-size="10">Personal baseline</text>

  <text x="550" y="818" text-anchor="middle" fill="#334155" font-size="10">claude-code-setup · github.com · public repo — no secrets · works on macOS, Linux, Windows</text>
