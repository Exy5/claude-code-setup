  <text x="916" y="508" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">💡  HOW IT WORKS</text>

  <text x="782" y="540" fill="#cbd5e1" font-size="11">1. You open a file</text>
  <text x="782" y="560" fill="#cbd5e1" font-size="11">2. Claude checks file globs</text>
  <text x="782" y="580" fill="#cbd5e1" font-size="11">3. Matching SKILL.md loads</text>
