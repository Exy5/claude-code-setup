  <rect width="1100" height="700" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">Skills Activation — Context-Based Auto-Loading</text>
  <text x="550" y="54" text-anchor="middle" fill="#64748b" font-size="12">Skills activate by file globs · Multiple skills can be active in mixed-stack repos · No manual invocation needed</text>
  <rect x="380" y="62" width="340" height="2" fill="url(#purple)" rx="1"/>

  <!-- ════════════════════════════════════════════ -->
