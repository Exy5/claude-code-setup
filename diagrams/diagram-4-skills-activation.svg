  <rect x="782" y="206" width="270" height="50" fill="#1a1a2e" rx="5" stroke="#475569" stroke-width="0.5"/>
  <text x="796" y="226" fill="#94a3b8" font-size="12" font-weight="700" font-family="'Cascadia Code','Fira Code',monospace">reference.md</text>
