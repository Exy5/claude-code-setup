    <circle cx="920" cy="155" r="5" fill="#94a3b8"/>
    <text x="932" y="159" fill="#cbd5e1">NIT</text>
  </g>
  <text x="590" y="184" fill="#94a3b8" font-size="10">Concrete examples for each level so agents</text>
  <text x="590" y="198" fill="#94a3b8" font-size="10">rate findings consistently and reports merge cleanly</text>

