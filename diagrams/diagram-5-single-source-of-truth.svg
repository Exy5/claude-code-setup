  <rect x="30" y="456" width="1040" height="10" fill="url(#purple)"/>
  <text x="550" y="456" text-anchor="middle" fill="#faf5ff" font-size="13" font-weight="700">💡  KEY PRINCIPLE — WHY THIS MATTERS</text>

  <text x="50" y="488" fill="#cbd5e1" font-size="11">Without centralized docs, conventions would be duplicated across 3 skills and 5+ agents.</text>
  <text x="50" y="504" fill="#cbd5e1" font-size="11">A single change (e.g., "switch from camelCase to snake_case for DB columns") would require editing 8+ files.</text>

  <!-- Without / With — clear gap below text -->
  <rect x="80" y="526" width="12" height="12" fill="#ef4444" rx="2"/>
  <text x="100" y="537" fill="#fca5a5" font-size="11" font-weight="700">Without:</text>
  <text x="172" y="537" fill="#94a3b8" font-size="11">edit 8+ files, risk drift, inconsistencies</text>

  <rect x="550" y="526" width="12" height="12" fill="#10b981" rx="2"/>
  <text x="570" y="537" fill="#6ee7b7" font-size="11" font-weight="700">With:</text>
  <text x="612" y="537" fill="#94a3b8" font-size="11">edit 1 file, all consumers inherit the change</text>

