  <text x="50" y="482" fill="#cbd5e1" font-size="11">Without centralized docs, conventions would be duplicated across 3 skills and 8+ agents.</text>
  <text x="50" y="498" fill="#cbd5e1" font-size="11">A single change (e.g., "switch from camelCase to snake_case for DB columns") would require editing 11+ files.</text>

  <rect x="80" y="518" width="12" height="12" fill="#ef4444" rx="2"/>
