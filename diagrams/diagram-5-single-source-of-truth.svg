  <text x="550" y="36" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">Single Source of Truth — Change Once, Applies Everywhere</text>
  <text x="550" y="54" text-anchor="middle" fill="#64748b" font-size="12">Centralized docs referenced by all skills and agents · No duplication · No drift</text>
  <rect x="380" y="62" width="340" height="2" fill="url(#green)" rx="1"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- SOURCE 1: coding-standards.md            -->
  <!-- ═══════════════════════════════════════ -->
  <g filter="url(#sh)">
