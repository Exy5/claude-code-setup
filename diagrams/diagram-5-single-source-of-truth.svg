  </defs>

  <rect width="1100" height="710" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">Single Source of Truth — Change Once, Applies Everywhere</text>
  <text x="550" y="54" text-anchor="middle" fill="#64748b" font-size="12">Centralized docs referenced by all skills and agents · No duplication · No drift</text>
  <rect x="380" y="62" width="340" height="2" fill="url(#green)" rx="1"/>

  <!-- ════════════════════════════════════════════ -->
  <!-- SOURCE 1: coding-standards.md                -->
  <!-- ════════════════════════════════════════════ -->
  <g filter="url(#sh)">
    <rect x="30" y="85" width="500" height="130" fill="#111827" rx="10" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <rect x="30" y="85" width="500" height="30" fill="url(#green)" rx="10"/>
  <rect x="30" y="105" width="500" height="10" fill="url(#green)"/>
  <text x="280" y="105" text-anchor="middle" fill="#f0fdf4" font-size="13" font-weight="700">📖  docs/coding-standards.md</text>

  <text x="50" y="136" fill="#cbd5e1" font-size="11">All coding conventions across stacks in one file:</text>
  <text x="50" y="156" fill="#94a3b8" font-size="10">• Java: naming, DI, exception handling, immutability, thread safety</text>
  <text x="50" y="172" fill="#94a3b8" font-size="10">• TypeScript: strict typing, no any, interface patterns, barrel exports</text>
  <text x="50" y="188" fill="#94a3b8" font-size="10">• Angular: component style, RxJS usage, lazy loading, standalone</text>
  <text x="50" y="204" fill="#94a3b8" font-size="10">• React: hooks rules, memoization, composition, state management</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- SOURCE 2: review-severity-scale.md           -->
  <!-- ════════════════════════════════════════════ -->
  <g filter="url(#sh)">
    <rect x="570" y="85" width="500" height="130" fill="#111827" rx="10" stroke="#d97706" stroke-width="1.5"/>
  </g>
