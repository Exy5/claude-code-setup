  <text x="50" y="136" fill="#cbd5e1" font-size="11">All coding conventions across stacks in one file:</text>
  <text x="50" y="156" fill="#94a3b8" font-size="10">• Java: naming, DI, exception handling, immutability, thread safety</text>
  <text x="50" y="172" fill="#94a3b8" font-size="10">• TypeScript: strict typing, no any, interface patterns</text>
  <text x="50" y="188" fill="#94a3b8" font-size="10">• Angular: component style, RxJS, lazy loading, standalone</text>
  <text x="50" y="204" fill="#94a3b8" font-size="10">• React: hooks rules, memoization, composition, state management</text>

