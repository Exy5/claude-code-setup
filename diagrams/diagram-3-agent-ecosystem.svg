<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#0c1222"/><stop offset="100%" stop-color="#141e30"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b91c1c"/><stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e7490"/><stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b45309"/><stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#047857"/><stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6d28d9"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1100" height="820" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">Agent Ecosystem — All 9 Agents</text>
  <text x="550" y="54" text-anchor="middle" fill="#64748b" font-size="12">Grouped by purpose · Triggers · Tool access · Relationships</text>
  <rect x="380" y="62" width="340" height="2" fill="url(#purple)" rx="1"/>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- GROUP 1: Review Agents                               -->
  <!-- ════════════════════════════════════════════════════ -->
  <g filter="url(#sh)">
    <rect x="30" y="82" width="1040" height="310" fill="#111827" rx="10" stroke="#ef4444" stroke-width="1"/>
  </g>
  <rect x="30" y="82" width="1040" height="30" fill="url(#red)" rx="10"/>
  <rect x="30" y="102" width="1040" height="10" fill="url(#red)"/>
  <text x="550" y="102" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">🔍  REVIEW AGENTS  ·  On-demand via /review  ·  4–7× token cost</text>

  <!-- Orchestrator -->
  <rect x="50" y="122" width="1000" height="72" fill="#1a1a2e" rx="8" stroke="#ef4444" stroke-width="1"/>
  <text x="70" y="146" fill="#fca5a5" font-size="14" font-weight="700">🎯 orchestrator-review</text>
  <text x="70" y="164" fill="#94a3b8" font-size="11">Spawns all 4 reviewers in parallel · Collects reports · Deduplicates · Sorts by severity with agent labels</text>
  <text x="70" y="180" fill="#94a3b8" font-size="11">Saves consolidated report to reviews/&lt;timestamp&gt;-review.md</text>
  <text x="730" y="146" fill="#475569" font-size="10">Trigger:</text>
  <text x="730" y="162" fill="#22d3ee" font-size="11" font-family="'Cascadia Code','Fira Code',monospace">/review [path]</text>
  <text x="880" y="146" fill="#475569" font-size="10">Model:</text>
  <text x="880" y="162" fill="#e2e8f0" font-size="11">Sonnet</text>
  <text x="940" y="146" fill="#475569" font-size="10">Tools:</text>
  <text x="940" y="162" fill="#e2e8f0" font-size="11">Read, Write,</text>
  <text x="940" y="176" fill="#e2e8f0" font-size="11">Glob, Grep, Agent</text>

  <!-- 4 Reviewers -->
  <!-- Architect -->
  <rect x="50" y="204" width="240" height="100" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="70" y="226" fill="#f8fafc" font-size="12" font-weight="700">🏗️ reviewer-architect</text>
  <text x="70" y="244" fill="#94a3b8" font-size="10">SOLID · Layer separation</text>
  <text x="70" y="258" fill="#94a3b8" font-size="10">DI correctness · Circular deps</text>
  <text x="70" y="272" fill="#94a3b8" font-size="10">Scalability · Design patterns</text>
  <rect x="70" y="280" width="200" height="16" fill="#0f172a" rx="3"/>
  <text x="80" y="292" fill="#64748b" font-size="9">Sonnet · Read, Glob, Grep</text>
  <circle cx="260" cy="292" r="5" fill="#ef4444"/>
  <text x="246" y="295" fill="#0f172a" font-size="7" font-weight="700" text-anchor="middle">RO</text>

  <!-- Security -->
  <rect x="306" y="204" width="240" height="100" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="326" y="226" fill="#f8fafc" font-size="12" font-weight="700">🛡️ reviewer-security</text>
  <text x="326" y="244" fill="#94a3b8" font-size="10">OWASP Top 10 · Injection</text>
  <text x="326" y="258" fill="#94a3b8" font-size="10">Secrets · Auth gaps · IaC</text>
  <text x="326" y="272" fill="#94a3b8" font-size="10">Supply chain · Input validation</text>
  <rect x="326" y="280" width="200" height="16" fill="#0f172a" rx="3"/>
  <text x="336" y="292" fill="#64748b" font-size="9">Sonnet (Opus crit.) · Read, Glob, Grep</text>
  <circle cx="516" cy="292" r="5" fill="#ef4444"/>
  <text x="502" y="295" fill="#0f172a" font-size="7" font-weight="700" text-anchor="middle">RO</text>

  <!-- Quality -->
  <rect x="562" y="204" width="240" height="100" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="582" y="226" fill="#f8fafc" font-size="12" font-weight="700">✨ reviewer-quality</text>
  <text x="582" y="244" fill="#94a3b8" font-size="10">Code smells · Naming · DRY</text>
  <text x="582" y="258" fill="#94a3b8" font-size="10">Dead code · Complexity</text>
  <text x="582" y="272" fill="#94a3b8" font-size="10">Missing docs · Test gaps</text>
  <rect x="582" y="280" width="200" height="16" fill="#0f172a" rx="3"/>
  <text x="592" y="292" fill="#64748b" font-size="9">Sonnet · Read, Glob, Grep</text>
  <circle cx="772" cy="292" r="5" fill="#ef4444"/>
  <text x="758" y="295" fill="#0f172a" font-size="7" font-weight="700" text-anchor="middle">RO</text>

  <!-- Performance -->
  <rect x="818" y="204" width="232" height="100" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="838" y="226" fill="#f8fafc" font-size="12" font-weight="700">⚡ reviewer-performance</text>
  <text x="838" y="244" fill="#94a3b8" font-size="10">N+1 · Memory leaks</text>
  <text x="838" y="258" fill="#94a3b8" font-size="10">Bundle size · Web Vitals</text>
  <text x="838" y="272" fill="#94a3b8" font-size="10">Re-renders · trackBy</text>
  <rect x="838" y="280" width="192" height="16" fill="#0f172a" rx="3"/>
  <text x="848" y="292" fill="#64748b" font-size="9">Sonnet · Read, Glob, Grep</text>
  <circle cx="1020" cy="292" r="5" fill="#ef4444"/>
  <text x="1006" y="295" fill="#0f172a" font-size="7" font-weight="700" text-anchor="middle">RO</text>

  <!-- read-only label -->
  <text x="50" y="380" fill="#64748b" font-size="10">
    <tspan fill="#ef4444" font-weight="700">RO</tspan> = read-only (cannot modify code)
  </text>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- GROUP 2: Generation Agents                           -->
  <!-- ════════════════════════════════════════════════════ -->
  <g filter="url(#sh)">
    <rect x="30" y="402" width="530" height="210" fill="#111827" rx="10" stroke="#06b6d4" stroke-width="1"/>
  </g>
  <rect x="30" y="402" width="530" height="30" fill="url(#cyan)" rx="10"/>
  <rect x="30" y="422" width="530" height="10" fill="url(#cyan)"/>
  <text x="295" y="422" text-anchor="middle" fill="#ecfeff" font-size="13" font-weight="700">✍️  GENERATION AGENTS  ·  Create files</text>

  <!-- test-writer -->
  <rect x="50" y="445" width="490" height="72" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="70" y="467" fill="#f8fafc" font-size="12" font-weight="700">🧪 test-writer</text>
  <rect x="190" y="454" width="72" height="18" fill="#059669" rx="3"/>
  <text x="226" y="466" text-anchor="middle" fill="#f0fdf4" font-size="9" font-weight="700">AUTO-SPAWN</text>
  <text x="70" y="485" fill="#94a3b8" font-size="10">Auto-spawns after code completion</text>
  <text x="70" y="499" fill="#94a3b8" font-size="10">JUnit/Mockito · Jest/Jasmine · 90%+ coverage</text>
  <text x="370" y="467" fill="#475569" font-size="10">Trigger:</text>
  <text x="370" y="481" fill="#10b981" font-size="10">automatic after feature</text>
  <text x="370" y="499" fill="#475569" font-size="10">Sonnet · Read, <tspan fill="#22d3ee">Write</tspan>, Glob, Grep</text>

  <!-- documenter -->
  <rect x="50" y="527" width="490" height="72" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="70" y="549" fill="#f8fafc" font-size="12" font-weight="700">📝 documenter</text>
  <text x="70" y="567" fill="#94a3b8" font-size="10">Analyzes codebase · Updates project docs</text>
  <text x="70" y="581" fill="#94a3b8" font-size="10">API docs, architecture, onboarding guides</text>
  <text x="370" y="549" fill="#475569" font-size="10">Trigger:</text>
  <text x="370" y="563" fill="#22d3ee" font-size="10" font-family="'Cascadia Code','Fira Code',monospace">/document</text>
  <text x="370" y="581" fill="#475569" font-size="10">Sonnet · Read, <tspan fill="#22d3ee">Write</tspan>, Glob, Grep</text>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- GROUP 3: Maintenance Agents                          -->
  <!-- ════════════════════════════════════════════════════ -->
  <g filter="url(#sh)">
    <rect x="580" y="402" width="490" height="210" fill="#111827" rx="10" stroke="#d97706" stroke-width="1"/>
  </g>
  <rect x="580" y="402" width="490" height="30" fill="url(#amber)" rx="10"/>
  <rect x="580" y="422" width="490" height="10" fill="url(#amber)"/>
  <text x="825" y="422" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">🔧  MAINTENANCE AGENTS  ·  Dependencies &amp; upgrades</text>

  <!-- dependency-scanner -->
  <rect x="600" y="445" width="450" height="72" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="620" y="467" fill="#f8fafc" font-size="12" font-weight="700">📦 dependency-scanner</text>
  <text x="620" y="485" fill="#94a3b8" font-size="10">Scans for outdated, vulnerable, or unused dependencies</text>
  <text x="620" y="499" fill="#94a3b8" font-size="10">npm audit, mvn dependency:analyze, license checks</text>
  <text x="880" y="467" fill="#475569" font-size="10">Trigger:</text>
  <text x="880" y="481" fill="#22d3ee" font-size="10" font-family="'Cascadia Code','Fira Code',monospace">/dependencies</text>
  <text x="880" y="499" fill="#475569" font-size="10">Sonnet · Read, Glob, Grep, <tspan fill="#f59e0b">Bash</tspan></text>

  <!-- upgrader -->
  <rect x="600" y="527" width="450" height="72" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="620" y="549" fill="#f8fafc" font-size="12" font-weight="700">⬆️ upgrader</text>
  <text x="620" y="567" fill="#94a3b8" font-size="10">Bumps framework/library versions, fixes breaking changes</text>
  <text x="620" y="581" fill="#94a3b8" font-size="10">Migration guides, API changes, deprecation handling</text>
  <text x="880" y="549" fill="#475569" font-size="10">Trigger:</text>
  <text x="880" y="563" fill="#22d3ee" font-size="10" font-family="'Cascadia Code','Fira Code',monospace">/upgrade</text>
  <text x="880" y="581" fill="#475569" font-size="10">Sonnet · Read, <tspan fill="#22d3ee">Write</tspan>, Glob, Grep, <tspan fill="#f59e0b">Bash</tspan></text>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- ACCESS LEVEL LEGEND                                  -->
  <!-- ════════════════════════════════════════════════════ -->
  <g filter="url(#sh)">
    <rect x="30" y="632" width="1040" height="170" fill="#111827" rx="10" stroke="#334155" stroke-width="1"/>
  </g>
  <rect x="30" y="632" width="1040" height="30" fill="url(#purple)" rx="10"/>
  <rect x="30" y="652" width="1040" height="10" fill="url(#purple)"/>
  <text x="550" y="652" text-anchor="middle" fill="#faf5ff" font-size="13" font-weight="700">🔐  TOOL ACCESS LEVELS</text>

  <!-- Read-only row -->
  <rect x="50" y="674" width="1000" height="36" fill="#1a1a2e" rx="6" stroke="#ef4444" stroke-width="0.5"/>
  <rect x="50" y="674" width="120" height="36" fill="#ef4444" rx="6"/>
  <rect x="162" y="674" width="8" height="36" fill="#ef4444"/>
  <text x="110" y="697" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">READ-ONLY</text>
  <text x="185" y="692" fill="#fca5a5" font-size="11">Read, Glob, Grep</text>
  <text x="185" y="704" fill="#64748b" font-size="10">Cannot modify any files — structural enforcement, not just instructions</text>
  <text x="620" y="697" fill="#94a3b8" font-size="10">reviewer-architect · reviewer-security · reviewer-quality · reviewer-performance</text>

  <!-- Read + Write row -->
  <rect x="50" y="718" width="1000" height="36" fill="#1a1a2e" rx="6" stroke="#06b6d4" stroke-width="0.5"/>
  <rect x="50" y="718" width="120" height="36" fill="#0e7490" rx="6"/>
  <rect x="162" y="718" width="8" height="36" fill="#0e7490"/>
  <text x="110" y="741" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">READ + WRITE</text>
  <text x="185" y="736" fill="#67e8f9" font-size="11">Read, Write, Glob, Grep</text>
  <text x="185" y="748" fill="#64748b" font-size="10">Can create and modify files (test files, docs, reports, code changes)</text>
  <text x="620" y="741" fill="#94a3b8" font-size="10">orchestrator-review · test-writer · documenter · upgrader</text>

  <!-- Bash row -->
  <rect x="50" y="762" width="1000" height="36" fill="#1a1a2e" rx="6" stroke="#d97706" stroke-width="0.5"/>
  <rect x="50" y="762" width="120" height="36" fill="#b45309" rx="6"/>
  <rect x="162" y="762" width="8" height="36" fill="#b45309"/>
  <text x="110" y="785" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">BASH ACCESS</text>
  <text x="185" y="780" fill="#fcd34d" font-size="11">Read, [Write], Glob, Grep, Bash</text>
  <text x="185" y="792" fill="#64748b" font-size="10">Can execute CLI commands (npm audit, mvn, package managers)</text>
  <text x="620" y="785" fill="#94a3b8" font-size="10">dependency-scanner (read-only + Bash) · upgrader (write + Bash)</text>

  <!-- Footer -->
  <text x="550" y="814" text-anchor="middle" fill="#334155" font-size="10">claude-code-setup · 5 review agents · 2 generation agents · 2 maintenance agents · least-privilege tool access</text>
</svg>