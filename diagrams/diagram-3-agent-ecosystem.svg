<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 900" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#0c1222"/><stop offset="100%" stop-color="#141e30"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#047857"/><stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b91c1c"/><stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b45309"/><stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6d28d9"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1100" height="900" fill="url(#bg)" rx="12"/>

  <text x="550" y="36" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">Agent Ecosystem — All 13 Agents</text>
  <text x="550" y="54" text-anchor="middle" fill="#64748b" font-size="12">Grouped by purpose · Triggers · Tool access</text>
  <rect x="380" y="62" width="340" height="2" fill="url(#purple)" rx="1"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- GROUP 1: Build Workflow Agents           -->
  <!-- ═══════════════════════════════════════ -->
  <g filter="url(#sh)">
    <rect x="30" y="82" width="1040" height="240" fill="#111827" rx="10" stroke="#10b981" stroke-width="1"/>
  </g>
  <rect x="30" y="82" width="1040" height="30" fill="url(#green)" rx="10"/>
  <rect x="30" y="102" width="1040" height="10" fill="url(#green)"/>
  <text x="550" y="102" text-anchor="middle" fill="#f0fdf4" font-size="13" font-weight="700">🔨  BUILD WORKFLOW AGENTS  ·  Triggered by /build</text>

  <!-- orchestrator-main -->
  <rect x="50" y="124" width="480" height="60" fill="#1a1a2e" rx="6" stroke="#10b981" stroke-width="0.8"/>
  <text x="70" y="146" fill="#6ee7b7" font-size="12" font-weight="700">🎯 orchestrator-main</text>
  <text x="70" y="164" fill="#94a3b8" font-size="10">Master coordinator · Never writes code · Sole writer of tasks/todo.md</text>
  <text x="70" y="178" fill="#64748b" font-size="10">Read, Write, Glob, Grep, Agent</text>

  <!-- researcher -->
  <rect x="550" y="124" width="500" height="60" fill="#1a1a2e" rx="6" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="570" y="146" fill="#93c5fd" font-size="12" font-weight="700">🔬 researcher  (×1–3 in parallel)</text>
  <text x="570" y="164" fill="#94a3b8" font-size="10">Full-problem analysis · Proposes complete solution · Majority principle selects winner</text>
  <text x="570" y="178" fill="#64748b" font-size="10">Read-only</text>

  <!-- developer -->
  <rect x="50" y="196" width="480" height="60" fill="#1a1a2e" rx="6" stroke="#10b981" stroke-width="0.8"/>
  <text x="70" y="218" fill="#6ee7b7" font-size="12" font-weight="700">👨‍💻 developer  (max 3 concurrent)</text>
  <text x="70" y="236" fill="#94a3b8" font-size="10">Implements one task + writes tests · Reports back to orchestrator</text>
  <text x="70" y="250" fill="#64748b" font-size="10">Read, Write, Glob, Grep, Bash</text>

  <!-- integration-reviewer -->
  <rect x="550" y="196" width="500" height="60" fill="#1a1a2e" rx="6" stroke="#f87171" stroke-width="0.8"/>
  <text x="570" y="218" fill="#fca5a5" font-size="12" font-weight="700">🔗 integration-reviewer</text>
  <text x="570" y="236" fill="#94a3b8" font-size="10">Post-build cross-cutting check · Compile verification</text>
  <text x="570" y="250" fill="#64748b" font-size="10">Read-only + Bash (compile checks)</text>

  <text x="50" y="312" fill="#64748b" font-size="10">
    <tspan fill="#10b981" font-weight="700">●</tspan> orchestrator-main coordinates the entire pipeline · researchers provide independent analyses · developers implement in parallel
  </text>

  <!-- ═══════════════════════════════════════ -->
  <!-- GROUP 2: Review Agents                   -->
  <!-- ═══════════════════════════════════════ -->
  <g filter="url(#sh)">
    <rect x="30" y="332" width="1040" height="200" fill="#111827" rx="10" stroke="#ef4444" stroke-width="1"/>
  </g>
  <rect x="30" y="332" width="1040" height="30" fill="url(#red)" rx="10"/>
  <rect x="30" y="352" width="1040" height="10" fill="url(#red)"/>
  <text x="550" y="352" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">🔍  REVIEW AGENTS  ·  Triggered by /review  ·  Also used in build per-task cycles</text>

  <!-- orchestrator-review -->
  <rect x="50" y="374" width="1000" height="46" fill="#1a1a2e" rx="6" stroke="#ef4444" stroke-width="0.8"/>
  <text x="70" y="396" fill="#fca5a5" font-size="12" font-weight="700">🎯 orchestrator-review</text>
  <text x="70" y="412" fill="#94a3b8" font-size="10">Spawns 4 reviewers in parallel · Deduplicates · Severity-sorted report with agent labels</text>
  <text x="750" y="396" fill="#64748b" font-size="10">Read, Write, Glob, Grep, Agent</text>

  <!-- 4 reviewers -->
  <rect x="50" y="432" width="240" height="52" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="70" y="454" fill="#f8fafc" font-size="11" font-weight="700">🏗️ reviewer-architect</text>
  <text x="70" y="472" fill="#94a3b8" font-size="9">SOLID · Layering · Scalability</text>
  <circle cx="268" cy="472" r="5" fill="#ef4444"/>

  <rect x="306" y="432" width="240" height="52" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="326" y="454" fill="#f8fafc" font-size="11" font-weight="700">🛡️ reviewer-security</text>
  <text x="326" y="472" fill="#94a3b8" font-size="9">OWASP · Secrets · Auth · IaC</text>
  <circle cx="524" cy="472" r="5" fill="#ef4444"/>

  <rect x="562" y="432" width="240" height="52" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="582" y="454" fill="#f8fafc" font-size="11" font-weight="700">✨ reviewer-quality</text>
  <text x="582" y="472" fill="#94a3b8" font-size="9">Smells · Naming · DRY</text>
  <circle cx="780" cy="472" r="5" fill="#ef4444"/>

  <rect x="818" y="432" width="232" height="52" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="838" y="454" fill="#f8fafc" font-size="11" font-weight="700">⚡ reviewer-performance</text>
  <text x="838" y="472" fill="#94a3b8" font-size="9">N+1 · Leaks · Web Vitals</text>
  <circle cx="1028" cy="472" r="5" fill="#ef4444"/>

  <text x="50" y="510" fill="#64748b" font-size="10">
    <tspan fill="#ef4444" font-weight="700">●</tspan> = read-only (cannot modify code)
  </text>
  <text x="280" y="510" fill="#64748b" font-size="10">During /build, only relevant reviewers are spawned per task (scoped review).</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- GROUP 3: Utility Agents                  -->
  <!-- ═══════════════════════════════════════ -->
  <g filter="url(#sh)">
    <rect x="30" y="540" width="1040" height="190" fill="#111827" rx="10" stroke="#d97706" stroke-width="1"/>
  </g>
  <rect x="30" y="540" width="1040" height="30" fill="url(#amber)" rx="10"/>
  <rect x="30" y="560" width="1040" height="10" fill="url(#amber)"/>
  <text x="550" y="560" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">🔧  UTILITY AGENTS  ·  On-demand + auto-triggered</text>

  <rect x="50" y="582" width="480" height="60" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="70" y="604" fill="#f8fafc" font-size="12" font-weight="700">📝 documenter</text>
  <text x="70" y="622" fill="#94a3b8" font-size="10">Auto after each build task + on-demand via /document</text>
  <text x="70" y="636" fill="#64748b" font-size="10">Read, Write, Glob, Grep</text>

  <rect x="550" y="582" width="500" height="60" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="570" y="604" fill="#f8fafc" font-size="12" font-weight="700">🧪 test-writer</text>
  <text x="570" y="622" fill="#94a3b8" font-size="10">Manual only via /test for existing code</text>
  <text x="570" y="636" fill="#64748b" font-size="10">Read, Write, Glob, Grep</text>

  <rect x="50" y="654" width="480" height="60" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="70" y="676" fill="#f8fafc" font-size="12" font-weight="700">📦 dependency-scanner</text>
  <text x="70" y="694" fill="#94a3b8" font-size="10">On-demand via /dependencies · npm audit, mvn analyze</text>
  <text x="70" y="708" fill="#64748b" font-size="10">Read-only + Bash</text>

  <rect x="550" y="654" width="500" height="60" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="570" y="676" fill="#f8fafc" font-size="12" font-weight="700">⬆️ upgrader</text>
  <text x="570" y="694" fill="#94a3b8" font-size="10">On-demand via /upgrade · Bumps versions, fixes breaking changes</text>
  <text x="570" y="708" fill="#64748b" font-size="10">Read, Write, Glob, Grep, Bash</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- ACCESS LEVEL LEGEND                      -->
  <!-- ═══════════════════════════════════════ -->
  <g filter="url(#sh)">
    <rect x="30" y="750" width="1040" height="130" fill="#111827" rx="10" stroke="#334155" stroke-width="1"/>
  </g>
  <rect x="30" y="750" width="1040" height="30" fill="url(#purple)" rx="10"/>
  <rect x="30" y="770" width="1040" height="10" fill="url(#purple)"/>
  <text x="550" y="770" text-anchor="middle" fill="#faf5ff" font-size="13" font-weight="700">🔐  TOOL ACCESS LEVELS</text>

  <rect x="50" y="792" width="1000" height="26" fill="#1a1a2e" rx="4" stroke="#ef4444" stroke-width="0.5"/>
  <rect x="50" y="792" width="100" height="26" fill="#ef4444" rx="4"/>
  <text x="100" y="810" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">READ-ONLY</text>
  <text x="165" y="810" fill="#94a3b8" font-size="10">researcher · reviewer-architect · reviewer-security · reviewer-quality · reviewer-performance</text>

  <rect x="50" y="824" width="1000" height="26" fill="#1a1a2e" rx="4" stroke="#06b6d4" stroke-width="0.5"/>
  <rect x="50" y="824" width="100" height="26" fill="#0e7490" rx="4"/>
  <text x="100" y="842" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">READ+WRITE</text>
  <text x="165" y="842" fill="#94a3b8" font-size="10">orchestrator-main · orchestrator-review · documenter · test-writer</text>

  <rect x="50" y="856" width="1000" height="26" fill="#1a1a2e" rx="4" stroke="#d97706" stroke-width="0.5"/>
  <rect x="50" y="856" width="100" height="26" fill="#b45309" rx="4"/>
  <text x="100" y="874" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">+BASH</text>
  <text x="165" y="874" fill="#94a3b8" font-size="10">developer · upgrader · integration-reviewer (read+Bash) · dependency-scanner (read+Bash)</text>

  <text x="550" y="898" text-anchor="middle" fill="#334155" font-size="10">claude-code-setup · 4 build agents · 5 review agents · 4 utility agents · least-privilege tool access</text>
</svg>