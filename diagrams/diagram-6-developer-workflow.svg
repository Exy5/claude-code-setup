<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#0c1222"/><stop offset="100%" stop-color="#141e30"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#047857"/><stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b45309"/><stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6d28d9"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b91c1c"/><stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e7490"/><stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="aW" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#94a3b8"/></marker>
  </defs>

  <rect width="1100" height="820" fill="url(#bg)" rx="12"/>

  <text x="550" y="36" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">Developer Workflow — Daily Usage</text>
  <text x="550" y="54" text-anchor="middle" fill="#64748b" font-size="12">Two paths: simple direct tasks vs. /build orchestrated pipeline · Plus on-demand commands anytime</text>
  <rect x="380" y="62" width="340" height="2" fill="url(#green)" rx="1"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- SESSION START (shared)                   -->
  <!-- ═══════════════════════════════════════ -->
  <g filter="url(#sh)">
    <rect x="300" y="82" width="500" height="100" fill="#111827" rx="10" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <rect x="300" y="82" width="500" height="30" fill="url(#green)" rx="10"/>
  <rect x="300" y="102" width="500" height="10" fill="url(#green)"/>
  <text x="550" y="102" text-anchor="middle" fill="#f0fdf4" font-size="13" font-weight="700">SESSION START</text>

  <text x="320" y="132" fill="#22d3ee" font-size="12" font-weight="700" font-family="'Cascadia Code','Fira Code',monospace">$ cd ~/projects/my-app &amp;&amp; claude</text>
  <text x="320" y="152" fill="#94a3b8" font-size="10">Loads: ~/.claude/CLAUDE.md → project .claude/CLAUDE.md → CLAUDE.local.md</text>
  <text x="320" y="168" fill="#94a3b8" font-size="10">New project? Claude asks kickoff questions → writes .claude/CLAUDE.md</text>

  <!-- Fork -->
  <path d="M430 182 L430 210" stroke="#94a3b8" stroke-width="2" marker-end="url(#aW)"/>
  <path d="M670 182 L670 210" stroke="#94a3b8" stroke-width="2" marker-end="url(#aW)"/>

  <text x="430" y="202" text-anchor="middle" fill="#64748b" font-size="9">small task</text>
  <text x="670" y="202" text-anchor="middle" fill="#64748b" font-size="9">complex task</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- LEFT PATH: Simple                        -->
  <!-- ═══════════════════════════════════════ -->
  <g filter="url(#sh)">
    <rect x="30" y="214" width="500" height="440" fill="#111827" rx="10" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <rect x="30" y="214" width="500" height="30" fill="url(#blue)" rx="10"/>
  <rect x="30" y="234" width="500" height="10" fill="url(#blue)"/>
  <text x="280" y="234" text-anchor="middle" fill="#eff6ff" font-size="13" font-weight="700">SIMPLE PATH — Direct Collaboration</text>

  <!-- Step 1 -->
  <rect x="50" y="256" width="460" height="52" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="70" y="276" fill="#3b82f6" font-size="11" font-weight="700">① WORK</text>
  <text x="70" y="294" fill="#94a3b8" font-size="10">Ask Claude directly · ask → plan → implement for non-trivial tasks</text>
  <text x="70" y="304" fill="#64748b" font-size="10">Skills auto-activate by file type (Java, Angular, React)</text>

  <path d="M280 308 L280 322" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#aW)"/>

  <!-- Step 2 -->
  <rect x="50" y="326" width="460" height="44" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="70" y="346" fill="#3b82f6" font-size="11" font-weight="700">② REVIEW</text>
  <text x="70" y="362" fill="#94a3b8" font-size="10">/review before committing · 4 parallel reviewers · severity-sorted report</text>

  <path d="M280 370 L280 384" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#aW)"/>

  <!-- Step 3 -->
  <rect x="50" y="388" width="460" height="44" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="70" y="408" fill="#3b82f6" font-size="11" font-weight="700">③ FIX</text>
  <text x="70" y="424" fill="#94a3b8" font-size="10">Address CRITICALs and MAJORs with main Claude session</text>

  <path d="M280 432 L280 446" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#aW)"/>

  <!-- Step 4 -->
  <rect x="50" y="450" width="460" height="44" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="70" y="470" fill="#3b82f6" font-size="11" font-weight="700">④ DOCUMENT  (optional)</text>
  <text x="70" y="486" fill="#94a3b8" font-size="10">/document for significant changes · Updates project architecture docs</text>

  <path d="M280 494 L280 508" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#aW)"/>

  <!-- Step 5 -->
  <rect x="50" y="512" width="460" height="44" fill="#1a1a2e" rx="6" stroke="#10b981" stroke-width="0.8"/>
  <text x="70" y="532" fill="#10b981" font-size="11" font-weight="700">⑤ COMMIT</text>
  <text x="70" y="548" fill="#22d3ee" font-size="10" font-family="'Cascadia Code','Fira Code',monospace">feat: add user profile endpoint</text>

  <text x="280" y="586" text-anchor="middle" fill="#64748b" font-size="10">Developer controls the pace.</text>
  <text x="280" y="602" text-anchor="middle" fill="#64748b" font-size="10">Manual commits with Conventional Commits.</text>
  <text x="280" y="618" text-anchor="middle" fill="#64748b" font-size="10">Good for: quick fixes, small features,</text>
  <text x="280" y="634" text-anchor="middle" fill="#64748b" font-size="10">exploratory work, single-file changes.</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- RIGHT PATH: /build                       -->
  <!-- ═══════════════════════════════════════ -->
  <g filter="url(#sh)">
    <rect x="570" y="214" width="500" height="440" fill="#111827" rx="10" stroke="#d97706" stroke-width="1.5"/>
  </g>
  <rect x="570" y="214" width="500" height="30" fill="url(#amber)" rx="10"/>
  <rect x="570" y="234" width="500" height="10" fill="url(#amber)"/>
  <text x="820" y="234" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">/build PATH — Full Orchestration</text>

  <rect x="590" y="256" width="460" height="44" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="610" y="276" fill="#d97706" font-size="11" font-weight="700">① CLARIFY</text>
  <text x="610" y="292" fill="#94a3b8" font-size="10">Orchestrator asks all open questions. Proceeds only when nothing unclear.</text>

  <path d="M820 300 L820 314" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#aW)"/>

  <rect x="590" y="318" width="460" height="44" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="610" y="338" fill="#d97706" font-size="11" font-weight="700">② RESEARCH</text>
  <text x="610" y="354" fill="#94a3b8" font-size="10">0–3 researchers in parallel (complexity-based) · Majority principle</text>

  <path d="M820 362 L820 376" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#aW)"/>

  <rect x="590" y="380" width="460" height="44" fill="#1a1a2e" rx="6" stroke="#334155" stroke-width="0.5"/>
  <text x="610" y="400" fill="#d97706" font-size="11" font-weight="700">③ ARCHITECT REVIEW</text>
  <text x="610" y="416" fill="#94a3b8" font-size="10">Review plan feasibility · Branch name determined · STOP if questions remain</text>

  <path d="M820 424 L820 438" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#aW)"/>

  <rect x="590" y="442" width="460" height="52" fill="#1a1a2e" rx="6" stroke="#10b981" stroke-width="0.8"/>
  <text x="610" y="462" fill="#d97706" font-size="11" font-weight="700">④ IMPLEMENT</text>
  <text x="610" y="478" fill="#94a3b8" font-size="10">Max 3 developer agents · Scoped reviews per task · Auto-documenter</text>
  <text x="610" y="490" fill="#94a3b8" font-size="10">Auto-commits · Progress tracked in tasks/todo.md</text>

  <path d="M820 494 L820 508" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#aW)"/>

  <rect x="590" y="512" width="460" height="44" fill="#1a1a2e" rx="6" stroke="#ef4444" stroke-width="0.8"/>
  <text x="610" y="532" fill="#d97706" font-size="11" font-weight="700">⑤ FINAL REVIEW</text>
  <text x="610" y="548" fill="#94a3b8" font-size="10">integration-reviewer + full /review in parallel · PASS/FAIL → report</text>

  <text x="820" y="586" text-anchor="middle" fill="#64748b" font-size="10">Orchestrator controls the pace.</text>
  <text x="820" y="602" text-anchor="middle" fill="#64748b" font-size="10">Auto commits per task, feature branch.</text>
  <text x="820" y="618" text-anchor="middle" fill="#64748b" font-size="10">Good for: multi-file features, complex</text>
  <text x="820" y="634" text-anchor="middle" fill="#64748b" font-size="10">refactors, greenfield components.</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- BOTTOM: On-demand commands               -->
  <!-- ═══════════════════════════════════════ -->
  <g filter="url(#sh)">
    <rect x="30" y="678" width="1040" height="120" fill="#111827" rx="10" stroke="#334155" stroke-width="1"/>
  </g>
  <rect x="30" y="678" width="1040" height="30" fill="#1e293b" rx="10"/>
  <rect x="30" y="698" width="1040" height="10" fill="#1e293b"/>
  <text x="550" y="698" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="700">⌨️  ON-DEMAND COMMANDS  ·  Available anytime in either path</text>

  <rect x="50" y="720" width="230" height="34" fill="#0f172a" rx="5" stroke="#334155" stroke-width="0.5"/>
  <text x="65" y="742" fill="#22d3ee" font-size="11" font-weight="700" font-family="'Cascadia Code','Fira Code',monospace">/review [path]</text>

  <rect x="296" y="720" width="230" height="34" fill="#0f172a" rx="5" stroke="#334155" stroke-width="0.5"/>
  <text x="311" y="742" fill="#22d3ee" font-size="11" font-weight="700" font-family="'Cascadia Code','Fira Code',monospace">/security &lt;file&gt;</text>

  <rect x="542" y="720" width="230" height="34" fill="#0f172a" rx="5" stroke="#334155" stroke-width="0.5"/>
  <text x="557" y="742" fill="#22d3ee" font-size="11" font-weight="700" font-family="'Cascadia Code','Fira Code',monospace">/document</text>

  <rect x="50" y="762" width="230" height="34" fill="#0f172a" rx="5" stroke="#334155" stroke-width="0.5"/>
  <text x="65" y="784" fill="#22d3ee" font-size="11" font-weight="700" font-family="'Cascadia Code','Fira Code',monospace">/dependencies</text>

  <rect x="296" y="762" width="230" height="34" fill="#0f172a" rx="5" stroke="#334155" stroke-width="0.5"/>
  <text x="311" y="784" fill="#22d3ee" font-size="11" font-weight="700" font-family="'Cascadia Code','Fira Code',monospace">/upgrade [framework]</text>

  <rect x="542" y="762" width="230" height="34" fill="#0f172a" rx="5" stroke="#334155" stroke-width="0.5"/>
  <text x="557" y="784" fill="#22d3ee" font-size="11" font-weight="700" font-family="'Cascadia Code','Fira Code',monospace">/test &lt;file&gt;</text>

  <text x="820" y="742" fill="#64748b" font-size="10">These commands work independently</text>
  <text x="820" y="758" fill="#64748b" font-size="10">of the current workflow path.</text>
  <text x="820" y="774" fill="#64748b" font-size="10">Use anytime during a session.</text>

  <text x="550" y="814" text-anchor="middle" fill="#334155" font-size="10">claude-code-setup · Simple path for quick work · /build for complex features · On-demand commands anytime</text>
</svg>